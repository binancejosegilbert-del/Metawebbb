<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Minero App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ESTILO MATRIZ / CUEVA DE ORO */
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(180deg, #d4af3733 0%, #0b0b0b 100%);
            border-bottom: 1px solid #d4af37;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #d4af37;
            text-shadow: 0 0 10px #d4af37;
            letter-spacing: 2px;
        }

        .balance-card {
            background: #161616;
            width: 85%;
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .balance-card::after {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #d4af37, #555, #d4af37);
            z-index: -1;
            border-radius: 22px;
            opacity: 0.3;
        }

        .balance-label {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            margin: 10px 0;
        }

        .balance-usd {
            color: #d4af37;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            margin-top: 20px;
        }

        .stat-box {
            background: #161616;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
        }

        .stat-box small { color: #888; }
        .stat-box p { margin: 5px 0 0; font-weight: bold; color: #d4af37; }

        .btn-mine {
            margin-top: 40px;
            background: linear-gradient(135deg, #d4af37 0%, #aa8a2e 100%);
            color: #000;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-mine:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.2);
        }

        /* Animación de brillo para el balance */
        .glow {
            animation: glow-anim 2s infinite alternate;
        }

        @keyframes glow-anim {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #d4af37; }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #d4af37; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>META MINERO</h1>
    </div>

    <div class="balance-card">
        <div class="balance-label">Tu Capital de Minado</div>
        <div class="balance-amount glow">$<span id="balance">0.0000</span></div>
        <div class="balance-usd">TON: <span id="ton-val">0.00</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <small>Mineros Activos</small>
            <p id="miners-count">0</p>
        </div>
        <div class="stat-box">
            <small>Producción/Día</small>
            <p id="daily-prod">$0.00</p>
        </div>
    </div>

    <button class="btn-mine" onclick="actionMine()">COMPRAR POTENCIA</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Pantalla completa
        tg.MainButton.setText("RETIRAR SALDO").show();
        
        // Colores de Telegram para integrarse mejor
        document.body.style.backgroundColor = tg.themeParams.bg_color || "#0b0b0b";

        // Función para simular el aumento del balance en tiempo real
        let currentBal = 0.0000;
        function updateVisualBalance() {
            currentBal += 0.0001; // Esto lo conectarás luego a tu API real
            document.getElementById('balance').innerText = currentBal.toFixed(4);
        }

        setInterval(updateVisualBalance, 3000);

        function actionMine() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showPopup({
                title: 'Tienda de Minería',
                message: '¿Deseas ir a la sección de compra de equipos?',
                buttons: [{id: 'ok', type: 'default', text: 'Ir a la Tienda'}]
            });
        }

        tg.onEvent('mainButtonClicked', function() {
            tg.close(); // O redirigir a la sección de retiro
        });
    </script>
</body>
</html>
